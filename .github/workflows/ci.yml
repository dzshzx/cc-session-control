name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --extra dev pytest tests/

      - name: Check for hardcoded home paths
        run: |
          if grep -rn --include='*.py' '/home/' src/; then
            exit 1
          fi

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel command
        run: uv run --isolated --no-project --with dist/*.whl csctl --version

      - name: Smoke test source distribution command
        run: uv run --isolated --no-project --with dist/*.tar.gz csctl --version
