name: Release (TestPyPI dry run)

# Manual dry run of the full publish pipeline against TestPyPI. TestPyPI is
# independent of PyPI, so uploading a version here does NOT consume that version
# on the real index. Trigger from the Actions tab or `gh workflow run`.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/cc-session-control/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --extra dev pytest tests/

      - name: Check for hardcoded home paths
        run: |
          if grep -rn --include='*.py' '/home/' src/; then
            exit 1
          fi

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel command
        run: uv run --isolated --no-project --with dist/*.whl csctl --version

      - name: Smoke test source distribution command
        run: uv run --isolated --no-project --with dist/*.tar.gz csctl --version

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-testpypi
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
